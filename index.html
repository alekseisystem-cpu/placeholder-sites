<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bold Move Co.</title>
  <meta name="theme-color" content="#12130F">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #12130F;
      --text: #E4DFDA;
      --accent: #2F9C95;
      --muted: rgba(228, 223, 218, 0.4);
      --glow: rgba(140, 70, 20, 0.35);

      --quint-out: cubic-bezier(0, 0.55, 0.45, 1);
      --quint-in-out: cubic-bezier(0.85, 0, 0.15, 1);
      --sine-in-out: cubic-bezier(0.37, 0, 0.63, 1);
    }

    ::selection {
      background: var(--accent);
      color: var(--bg);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Warm copper vignette glow on edges ── */
    .edge-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(ellipse at 0% 0%, var(--glow), transparent 40%),
        radial-gradient(ellipse at 100% 0%, var(--glow), transparent 40%),
        radial-gradient(ellipse at 0% 100%, var(--glow), transparent 40%),
        radial-gradient(ellipse at 100% 100%, var(--glow), transparent 40%);
    }

    /* ── Page container ── */
    .page {
      height: 100dvh;
      width: 91.666%;
      margin: 0 auto;
      padding: 1.5rem 0;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      animation: zoomIn 0.5s var(--quint-out) both;
    }

    @media (min-width: 768px) {
      .page { padding: 3.5rem 0; }
    }

    @keyframes zoomIn {
      0% { transform: scale(1.1); }
      100% { transform: none; }
    }

    /* ── Top: Large heading ── */
    .heading {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 0.95;
      text-transform: uppercase;
      animation: fadeIn 0.6s var(--sine-in-out) both;
    }

    .char-wrap {
      display: inline-block;
      overflow: hidden;
    }

    .char {
      display: inline-block;
      animation: charReveal 0.7s var(--quint-in-out) both;
      transform-origin: bottom;
    }

    @keyframes charReveal {
      0% { transform: scaleY(0) scaleX(0.4); opacity: 0; }
      100% { transform: none; opacity: 1; }
    }

    /* ── Bottom section ── */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 2rem;
    }

    /* ── Bottom left: info ── */
    .info {
      animation: fadeIn 0.6s var(--sine-in-out) 0.3s both;
    }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.55rem, 1.2vw, 0.7rem);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .desc {
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.35;
      max-width: 550px;
    }

    .desc-sub {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.55rem, 1.2vw, 0.7rem);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 1.25rem;
    }

    /* ── Bottom right: contact pill ── */
    .links {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
      animation: fadeIn 0.6s var(--sine-in-out) 0.5s both;
      flex-shrink: 0;
    }

    .pill {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.65rem, 1.2vw, 0.8rem);
      color: var(--text);
      text-decoration: none;
      padding: 0.45rem 1rem;
      border-radius: 9999px;
      border: 1px dashed rgba(228, 223, 218, 0.2);
      background: rgba(18, 19, 15, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color 0s, border-style 0s;
      white-space: nowrap;
      display: inline-block;
    }

    .pill:hover {
      border: 1px solid rgba(228, 223, 218, 1);
      transition: border-color 0.5s, border-style 0s;
    }

    .pill:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
    }

    /* ── Clock ── */
    .clock {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .blink {
      animation: blink 2s steps(2, jump-none) infinite;
    }

    @keyframes blink {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .ampm {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.5rem, 1vw, 0.65rem);
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.1em;
      vertical-align: super;
      margin-left: 0.3rem;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      .bottom {
        flex-direction: column;
        align-items: flex-start;
      }
      .links {
        flex-direction: row;
        align-items: center;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="edge-glow"></div>

  <div class="page">
    <!-- Top: Name -->
    <h1 class="heading" id="heading" aria-label="Bold Move"></h1>

    <!-- Bottom -->
    <div class="bottom">
      <!-- Left: Info -->
      <div class="info">
        <div class="label">Local Time (UTC<span id="utcOffset"></span>)</div>
        <div class="clock" id="clock"></div>

        <p class="desc">Business consulting &amp; growth services &#xb0; Helping companies reach their potential</p>

        <div class="desc-sub">Est. 2026 &mdash; Strategy &amp; Operations</div>
      </div>

      <!-- Right: Contact -->
      <div class="links">
        <a id="email-btn" href="mailto:alex@boldmoveco.com" class="pill">Email</a>
        <a id="email-addr" href="mailto:alex@boldmoveco.com" class="pill">alex@boldmoveco.com</a>
      </div>
    </div>
  </div>

  <script>
    // Domain → brand mapping
    var BRANDS = {
      'boldmoveco.com':     'Bold Move',
      'akbizmail.com':      'AK BizMail',
      'steadygrowco.com':   'Steady Grow',
      'smartpathmail.com':  'Smart Path',
      'pushforwardbiz.com': 'Push Forward',
      'peakgrowthco.com':   'Peak Growth',
      'dataflowbiz.com':    'Data Flow',
      'replymate.au':       'Reply Mate'
    };

    var host = window.location.hostname.replace(/^www\./, '');
    var domain = (host && host !== 'localhost' && !host.includes('vercel'))
      ? host
      : 'boldmoveco.com';
    var brand = BRANDS[domain] || domain.replace(/\.\w+$/, '').replace(/[-]/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });

    // Character reveal for heading
    (function () {
      var el = document.getElementById('heading');
      el.setAttribute('aria-label', brand);
      var baseDelay = 0.12;
      var stagger = 0.04;
      brand.split('').forEach(function (ch, i) {
        var wrap = document.createElement('span');
        wrap.className = 'char-wrap';
        var span = document.createElement('span');
        span.className = 'char';
        span.style.animationDelay = (baseDelay + i * stagger) + 's';
        span.textContent = ch === ' ' ? '\u00A0' : ch;
        wrap.appendChild(span);
        el.appendChild(wrap);
      });
    })();

    // Clock
    (function () {
      var clockEl = document.getElementById('clock');
      var offsetEl = document.getElementById('utcOffset');
      var offset = -(new Date().getTimezoneOffset() / 60);
      offsetEl.textContent = (offset >= 0 ? '+' : '') + offset + ':00';

      function tick() {
        var now = new Date();
        var h = now.getHours();
        var m = String(now.getMinutes()).padStart(2, '0');
        var ampm = h >= 12 ? 'pm' : 'am';
        var h12 = h % 12 || 12;
        clockEl.innerHTML =
          String(h12).padStart(2, '0') +
          '<span class="blink">:</span>' +
          m +
          '<span class="ampm">' + ampm + '</span>';
      }
      tick();
      setInterval(tick, 1000);
    })();

    // Dynamic email based on current domain
    (function () {
      var email = 'alex@' + domain;
      var btn = document.getElementById('email-btn');
      var addr = document.getElementById('email-addr');
      btn.href = 'mailto:' + email;
      addr.href = 'mailto:' + email;
      addr.textContent = email;
    })();

    // Update page title
    document.title = brand;
  </script>
</body>
</html>
