<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bold Move Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0f;
      color: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(47, 156, 149, 0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, rgba(100, 60, 180, 0.04) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 80%, rgba(47, 156, 149, 0.03) 0%, transparent 50%);
      animation: drift 12s ease-in-out infinite alternate;
      z-index: 0;
    }

    /* Grain texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-20px, 10px) scale(1.05); }
    }

    main {
      position: relative;
      z-index: 2;
      max-width: 560px;
      padding: 2rem;
      animation: enter 1s ease-out both;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 500;
      letter-spacing: 0.06em;
      margin-bottom: 1.5rem;
      color: #f0f0f0;
    }

    p {
      font-size: clamp(0.82rem, 1.8vw, 0.92rem);
      font-weight: 300;
      line-height: 1.75;
      color: #777;
      margin-bottom: 2.5rem;
      letter-spacing: 0.02em;
    }

    a {
      font-size: clamp(0.78rem, 1.6vw, 0.88rem);
      font-weight: 400;
      color: #2f9c95;
      text-decoration: none;
      border-bottom: 1px dashed rgba(47, 156, 149, 0.4);
      padding-bottom: 2px;
      transition: border-bottom 0.4s ease, color 0.4s ease;
      letter-spacing: 0.03em;
    }

    a:hover {
      border-bottom: 1px solid #2f9c95;
      color: #3bbdb5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Bold Move Co.</h1>
    <p>Professional business consulting and growth services. Helping businesses reach their potential.</p>
    <a href="mailto:alex@boldmoveco.com">alex@boldmoveco.com</a>
  </main>
</body>
</html>
